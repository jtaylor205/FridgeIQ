<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background: rounded green square -->
  <rect width="100" height="100" rx="22" fill="#2A6B4A"/>

  <!-- Fridge body outline -->
  <rect x="21" y="9" width="54" height="76" rx="8"
        stroke="white" stroke-width="4" stroke-opacity="0.95"/>

  <!-- Freezer / fridge divider -->
  <line x1="21" y1="35" x2="75" y2="35"
        stroke="white" stroke-width="2.5" stroke-opacity="0.40"/>

  <!-- Freezer door handle (short, top-right) -->
  <rect x="63" y="16" width="5" height="12" rx="2.5"
        fill="white" fill-opacity="0.85"/>

  <!-- Fridge door handle (tall, bottom-right) -->
  <rect x="63" y="43" width="5" height="25" rx="2.5"
        fill="white" fill-opacity="0.85"/>

  <!-- Lightning bolt — smart / IQ indicator -->
  <path d="M44 48 L37 66 L43 66 L36 82 L47 66 L41 66 Z"
        fill="white" fill-opacity="0.92"/>
</svg>
